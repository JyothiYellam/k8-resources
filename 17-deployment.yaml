apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    project: roboshop
    purpose: deployment-demo
    tier: frontend
    component: frontend
spec:
  replicas: 4
  selector:
    matchLabels:
      project: roboshop
      purpose: deployment-demo
      tier: frontend
      component: frontend
  template:
    metadata:
      labels:
        project: roboshop
        purpose: deployment-demo
        tier: frontend
        component: frontend
    spec:
      containers:
        - name: nginx
          image: nginx
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  labels:
     project: roboshop
     purpose: deployment-demo
     tier: frontend
     component: frontend
spec:
  selector: 
    project: roboshop
    tier: db
    environment: mongodb
  ports: 
   - protocol: TCP
     port: 27017
     targetPort: 27017

---
apiVersion: v1
kind: Service
metadata:
  name: nginx
spec:
  selector: 
    project: roboshop
    component: frontend
  ports: 
   - protocol: TCP
     port: 80 #service port
     targetPort: 80 #container port